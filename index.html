<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOZ Interview Experiences</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #242736;
      --border: #2e3348;
      --text: #e4e6ed;
      --text2: #9ca0b0;
      --accent: #6c8cff;
      --accent2: #4d6bdb;
      --tag-bg: #2a2f45;
      --tag-text: #8ea4ff;
      --green: #4ade80;
      --orange: #fb923c;
      --pink: #f472b6;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Layout ─────────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 100vh;
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
      }
      .sidebar {
        position: fixed;
        left: -100%;
        top: 0;
        z-index: 100;
        width: 320px;
        height: 100vh;
        transition: left 0.3s ease;
      }
      .sidebar.open { left: 0; }
      .mobile-toggle { display: flex !important; }
      .overlay { display: block !important; }
      .overlay.active {
        opacity: 1;
        pointer-events: auto;
      }
    }

    /* ── Sidebar ────────────────────────────────────────── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow: hidden;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      height: 100vh;
      position: sticky;
      top: 0;
    }

    .company-list-wrapper {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    .sidebar h2 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text2);
      padding: 0 8px;
    }

    .company-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .company-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
    }

    .company-item:hover { background: var(--surface2); }
    .company-item.active { background: var(--accent2); color: #fff; }
    .company-item.active .company-count { background: rgba(255,255,255,0.2); color: #fff; }

    .company-name {
      font-size: 14px;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .company-count {
      font-size: 12px;
      font-weight: 600;
      background: var(--tag-bg);
      color: var(--tag-text);
      padding: 2px 8px;
      border-radius: 99px;
      flex-shrink: 0;
      margin-left: 8px;
    }

    .rank-badge {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      margin-right: 10px;
    }
    .rank-1 { background: #facc15; color: #1a1d27; }
    .rank-2 { background: #94a3b8; color: #1a1d27; }
    .rank-3 { background: #d97706; color: #1a1d27; }
    .rank-other { background: var(--surface2); color: var(--text2); font-size: 10px; }

    /* ── Main content ───────────────────────────────────── */
    .main {
      overflow-y: auto;
      height: 100vh;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(15, 17, 23, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .mobile-toggle {
      display: none;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 18px;
      flex-shrink: 0;
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
    }

    .search-box {
      flex: 1;
      max-width: 500px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box input:focus { border-color: var(--accent); }

    .search-box::before {
      content: '🔍';
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
    }

    .stats {
      display: flex;
      gap: 16px;
      margin-left: auto;
      font-size: 13px;
      color: var(--text2);
      white-space: nowrap;
    }

    .stat-num {
      font-weight: 700;
      color: var(--accent);
    }

    /* ── Posts ───────────────────────────────────────────── */
    .posts-container {
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 900px;
    }

    .filter-info {
      padding: 12px 16px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      font-size: 14px;
      color: var(--text2);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .filter-info .clear-btn {
      color: var(--accent);
      cursor: pointer;
      font-size: 13px;
      border: none;
      background: none;
      text-decoration: underline;
    }

    .post-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      transition: border-color 0.2s;
    }

    .post-card:hover { border-color: var(--accent); }

    .post-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
    }

    .post-meta {
      flex: 1;
    }

    .post-author {
      font-weight: 600;
      font-size: 15px;
    }

    .post-date {
      font-size: 12px;
      color: var(--text2);
    }

    .post-id {
      font-size: 12px;
      color: var(--text2);
      background: var(--surface2);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .post-companies {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .company-tag {
      font-size: 12px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 99px;
      background: var(--tag-bg);
      color: var(--tag-text);
      cursor: pointer;
      transition: background 0.15s;
    }

    .company-tag:hover { background: var(--accent2); color: #fff; }

    .post-content {
      font-size: 14px;
      line-height: 1.75;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .post-content.collapsed {
      max-height: 300px;
      overflow: hidden;
      position: relative;
    }

    .post-content.collapsed::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: linear-gradient(transparent, var(--surface));
      pointer-events: none;
    }

    .expand-btn {
      margin-top: 8px;
      border: none;
      background: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 13px;
      padding: 4px 0;
    }

    .expand-btn:hover { text-decoration: underline; }

    /* ── Loading & empty states ─────────────────────────── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 0;
      color: var(--text2);
      font-size: 15px;
      gap: 12px;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 80px 32px;
      color: var(--text2);
    }

    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }

    /* ── Scrollbar ──────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text2); }

    /* ── Pagination ─────────────────────────────────────── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 24px 0 48px;
    }

    .pagination button {
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }

    .pagination button:hover { border-color: var(--accent); }
    .pagination button.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }
    .pagination button:disabled { opacity: 0.3; cursor: default; }

    .pagination .page-info { font-size: 13px; color: var(--text2); }

    /* ── Source tabs ─────────────────────────────────────── */
    .source-tabs {
      display: flex;
      gap: 6px;
      padding: 12px 32px 0;
      max-width: 900px;
    }

    .source-tab {
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }

    .source-tab:hover { border-color: var(--accent); color: var(--text); }
    .source-tab.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }

    .source-badge {
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 2px;
      font-weight: 600;
    }
    .source-badge.interview { background: #2563eb22; color: #60a5fa; }
    .source-badge.review { background: #16a34a22; color: #4ade80; }
  </style>
</head>
<body>
  <div class="overlay" id="overlay"></div>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <h2>🏢 Companies</h2>
        <span id="companyTotal" style="font-size:12px;color:var(--text2)"></span>
      </div>
      <input type="text" id="companySearch" placeholder="Filter companies..."
             style="width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;outline:none">
      <div class="company-list-wrapper">
        <div class="company-list" id="companyList"></div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main" id="mainScroll">
      <div class="header">
        <button class="mobile-toggle" id="mobileToggle">☰</button>
        <div class="logo">VOZ Interviews</div>
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Search posts by keyword, author, company...">
        </div>
        <div class="stats">
          <span><span class="stat-num" id="statPosts">0</span> posts</span>
          <span><span class="stat-num" id="statCompanies">0</span> companies</span>
        </div>
      </div>
      <div class="source-tabs" id="sourceTabs"></div>
      <div class="posts-container" id="postsContainer">
        <div class="loading"><div class="spinner"></div> Loading data...</div>
      </div>
    </main>
  </div>

  <script>
    // ── State ──────────────────────────────────────────────
    let DATA = null;
    let filteredPosts = [];
    let selectedCompany = null;
    let selectedSource = null;
    let searchQuery = '';
    let currentPage = 1;
    const PAGE_SIZE = 20;

    // Avatar colors
    const COLORS = [
      '#6c8cff','#f472b6','#4ade80','#fb923c','#a78bfa',
      '#38bdf8','#f87171','#facc15','#34d399','#e879f9'
    ];

    function hashColor(str) {
      let h = 0;
      for (let i = 0; i < str.length; i++) h = str.charCodeAt(i) + ((h << 5) - h);
      return COLORS[Math.abs(h) % COLORS.length];
    }

    // ── Load data ──────────────────────────────────────────
    async function loadData() {
      try {
        const resp = await fetch('posts.json');
        DATA = await resp.json();
        document.getElementById('statPosts').textContent = DATA.meta.total_posts;
        document.getElementById('statCompanies').textContent = DATA.meta.total_companies;
        document.getElementById('companyTotal').textContent = `(${DATA.companies.length})`;
        renderSourceTabs();
        renderCompanies();
        applyFilters();
      } catch (e) {
        document.getElementById('postsContainer').innerHTML =
          '<div class="empty-state"><div class="icon">❌</div><h3>Failed to load data</h3><p>Make sure posts.json exists. Run: python3 process_data.py</p></div>';
      }
    }

    // ── Render companies sidebar ───────────────────────────
    function renderCompanies(filter = '') {
      const list = document.getElementById('companyList');
      const filterLow = filter.toLowerCase();
      const companies = DATA.companies.filter(c =>
        !filterLow || c.name.toLowerCase().includes(filterLow)
      );

      list.innerHTML = companies.map((c, i) => {
        const rank = DATA.companies.indexOf(c) + 1;
        const isActive = selectedCompany === c.name;
        let rankClass = 'rank-other';
        if (rank === 1) rankClass = 'rank-1';
        else if (rank === 2) rankClass = 'rank-2';
        else if (rank === 3) rankClass = 'rank-3';

        return `
          <div class="company-item ${isActive ? 'active' : ''}"
               onclick="selectCompany('${c.name.replace(/'/g, "\\'")}')">
            <div style="display:flex;align-items:center;overflow:hidden">
              <div class="rank-badge ${rankClass}">${rank}</div>
              <span class="company-name">${esc(c.name)}</span>
            </div>
            <span class="company-count">${c.count}</span>
          </div>`;
      }).join('');
    }

    function selectCompany(name) {
      selectedCompany = selectedCompany === name ? null : name;
      currentPage = 1;
      renderCompanies(document.getElementById('companySearch').value);
      applyFilters();
    }

    // ── Render source tabs ────────────────────────────────
    function renderSourceTabs() {
      const sources = [...new Set(DATA.posts.map(p => p.source).filter(Boolean))];
      if (sources.length <= 1) {
        document.getElementById('sourceTabs').style.display = 'none';
        return;
      }
      const tabs = document.getElementById('sourceTabs');
      let html = `<button class="source-tab ${!selectedSource ? 'active' : ''}" onclick="selectSource(null)">All (${DATA.posts.length})</button>`;
      for (const src of sources) {
        const count = DATA.posts.filter(p => p.source === src).length;
        const cls = src.toLowerCase().includes('interview') ? 'interview' : 'review';
        html += `<button class="source-tab ${selectedSource === src ? 'active' : ''}" onclick="selectSource('${src.replace(/'/g, "\\'")}')">${esc(src)} (${count})</button>`;
      }
      tabs.innerHTML = html;
    }

    function selectSource(src) {
      selectedSource = src;
      currentPage = 1;
      renderSourceTabs();
      applyFilters();
    }

    // ── Filter and render posts ────────────────────────────
    function applyFilters() {
      if (!DATA) return;
      const q = searchQuery.toLowerCase();

      filteredPosts = DATA.posts.filter(post => {
        // Source filter
        if (selectedSource && post.source !== selectedSource) return false;
        // Company filter
        if (selectedCompany && !post.companies.includes(selectedCompany)) return false;
        // Search
        if (q) {
          const haystack = (post.author + ' ' + post.content + ' ' + post.companies.join(' ')).toLowerCase();
          // Support multi-word: all words must match
          const words = q.split(/\s+/).filter(Boolean);
          return words.every(w => haystack.includes(w));
        }
        return true;
      });

      renderPosts();
    }

    function renderPosts() {
      const container = document.getElementById('postsContainer');
      const total = filteredPosts.length;
      const totalPages = Math.ceil(total / PAGE_SIZE);
      if (currentPage > totalPages) currentPage = Math.max(1, totalPages);

      const start = (currentPage - 1) * PAGE_SIZE;
      const pageItems = filteredPosts.slice(start, start + PAGE_SIZE);

      let html = '';

      // Filter info bar
      if (selectedCompany || searchQuery) {
        html += `<div class="filter-info">
          <span>Showing <strong>${total}</strong> posts
            ${selectedCompany ? ` for <strong>${esc(selectedCompany)}</strong>` : ''}
            ${searchQuery ? ` matching "<strong>${esc(searchQuery)}</strong>"` : ''}
          </span>
          <button class="clear-btn" onclick="clearFilters()">Clear filters</button>
        </div>`;
      }

      if (pageItems.length === 0) {
        html += '<div class="empty-state"><div class="icon">📭</div><h3>No posts found</h3><p>Try adjusting your search or filters.</p></div>';
        container.innerHTML = html;
        return;
      }

      for (const post of pageItems) {
        const color = hashColor(post.author);
        const initial = post.author.charAt(0).toUpperCase();
        const needsCollapse = post.content.length > 800;

        html += `
          <div class="post-card" id="post-${post.id}">
            <div class="post-header">
              <div class="avatar" style="background:${color}22;color:${color}">${initial}</div>
              <div class="post-meta">
                <div class="post-author">${esc(post.author)}</div>
                <div class="post-date">${esc(post.date)}</div>
              </div>
              <span class="post-id">#${post.id}</span>
              ${post.source ? `<span class="source-badge ${post.source.toLowerCase().includes('interview') ? 'interview' : 'review'}">${post.source.includes('Interview') ? 'PV' : 'Review'}</span>` : ''}
            </div>
            ${post.companies.length > 0 ? `
              <div class="post-companies">
                ${post.companies.map(c => `<span class="company-tag" onclick="selectCompany('${c.replace(/'/g, "\\'")}')">${esc(c)}</span>`).join('')}
              </div>` : ''}
            <div class="post-content ${needsCollapse ? 'collapsed' : ''}" id="content-${post.id}">
              ${esc(post.content)}</div>
            ${needsCollapse ? `<button class="expand-btn" onclick="toggleExpand(${post.id})">Show more ▾</button>` : ''}
          </div>`;
      }

      // Pagination
      if (totalPages > 1) {
        html += '<div class="pagination">';
        html += `<button ${currentPage <= 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">← Prev</button>`;

        const pages = getPageNumbers(currentPage, totalPages);
        for (const p of pages) {
          if (p === '...') {
            html += '<span class="page-info">…</span>';
          } else {
            html += `<button class="${p === currentPage ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`;
          }
        }

        html += `<button ${currentPage >= totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">Next →</button>`;
        html += `<span class="page-info">${total} posts</span>`;
        html += '</div>';
      }

      container.innerHTML = html;
    }

    function getPageNumbers(current, total) {
      const pages = [];
      if (total <= 7) {
        for (let i = 1; i <= total; i++) pages.push(i);
      } else {
        pages.push(1);
        if (current > 3) pages.push('...');
        for (let i = Math.max(2, current - 1); i <= Math.min(total - 1, current + 1); i++) {
          pages.push(i);
        }
        if (current < total - 2) pages.push('...');
        pages.push(total);
      }
      return pages;
    }

    function goPage(n) {
      currentPage = n;
      renderPosts();
      document.getElementById('mainScroll').scrollTo({ top: 0, behavior: 'smooth' });
    }

    function toggleExpand(id) {
      const el = document.getElementById('content-' + id);
      const btn = el.nextElementSibling;
      if (el.classList.contains('collapsed')) {
        el.classList.remove('collapsed');
        btn.textContent = 'Show less ▴';
      } else {
        el.classList.add('collapsed');
        btn.textContent = 'Show more ▾';
      }
    }

    function clearFilters() {
      selectedCompany = null;
      selectedSource = null;
      searchQuery = '';
      currentPage = 1;
      document.getElementById('searchInput').value = '';
      document.getElementById('companySearch').value = '';
      renderSourceTabs();
      renderCompanies();
      applyFilters();
    }

    function esc(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    // ── Events ──────────────────────────────────────────────
    document.getElementById('searchInput').addEventListener('input', e => {
      searchQuery = e.target.value;
      currentPage = 1;
      applyFilters();
    });

    document.getElementById('companySearch').addEventListener('input', e => {
      renderCompanies(e.target.value);
    });

    // Mobile sidebar
    document.getElementById('mobileToggle').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('active');
    });
    document.getElementById('overlay').addEventListener('click', () => {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('active');
    });

    // Keyboard shortcut: / to focus search
    document.addEventListener('keydown', e => {
      if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
        e.preventDefault();
        document.getElementById('searchInput').focus();
      }
      if (e.key === 'Escape') {
        document.activeElement.blur();
      }
    });

    // ── Init ────────────────────────────────────────────────
    loadData();
  </script>
</body>
</html>
